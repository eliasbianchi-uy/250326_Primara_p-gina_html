<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--<link rel="stylesheet" href="style.css">-->
    <title>Mi primera página</title>

</head>

<body>
    <header>
        <h1>Mi primera página web</h1>
    </header>

    <nav>
        <a href="/">Inicio</a>
        <a href="/formulario.html">Formulario</a>
    </nav>

    <main>
        <p>Hola Mundo</p>

        <p>Esta es mi primear <em>página web</em>. Aprendiendo a <strong>programar</strong> en HTML <a href="/">Link</a>
        </p>

        <h2>Mis Hobbies</h2>
        <ul>
            <li>Programar</li>
            <li>Nadar</li>
            <li>Andar en bici</li>
        </ul>

        <h2>Contacto</h2>
        <a href="mailto:elias.bianchi@utec.edu.uy">Enviar Correo</a>

        <section>
            <form action="/" method="GET">
                <div class="inputs container">
                    <h2>Inputs</h2>
                    <label>
                        texto:
                        <input type="text" name="nombre">
                    </label>
                    <label>
                        contraseña:
                        <input type="password">
                    </label>
                    <label>
                        correo:
                        <input type="email">
                    </label>
                    <label>
                        fecha:
                        <input type="date">
                    </label>
                    <label>
                        número:
                        <input type="number">
                    </label>
                </div>

                <div class="radio container">
                    <h2>Genero</h2>
                    <label>
                        <input type="radio" name="genero" value="masculino">
                        Masculino
                    </label>

                    <label>
                        <input type="radio" name="genero" value="femenino">
                        Femenino
                    </label>
                </div>

                <div class="checkbox container">
                    <h2>Hobbies</h2>
                    <label>
                        <input type="checkbox" name="hobby" value="programar">
                        Programar
                    </label>
                    <label>
                        <input type="checkbox" name="hobby" value="Dormir">
                        Dormir
                    </label>
                    <label>
                        <input type="checkbox" name="hobby" value="caminar">
                        Caminar
                    </label>
                </div>

                <div class="select container">
                    <h2>Select box</h2>
                    <select name="nacionalidad" id="">
                        <option value="uy">Uruguay</option>
                        <option value="ar">Argentina</option>
                    </select>
                </div>

                <!-- Esto es un comentario -->

                <div class="textarea container">
                    <h2>TextArea</h2>
                    <textarea name="textarea" id=""></textarea>
                </div>

                <div class="botones container">
                    <h2>Botones</h2>
                    <button type="submit">Enviar</button>
                    <button type="reset">Limpiar</button>
                </div>
            </form>
        </section>
    </main>

    <footer>
        @copyrigth elias bianchi
    </footer>
</body>

</html>
